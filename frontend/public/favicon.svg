<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Outer circuit border -->
  <rect width="100" height="100" rx="20" fill="none" stroke="#1e2d45" stroke-width="1.5"/>
  <!-- Corner circuit nodes -->
  <circle cx="18" cy="18" r="2.5" fill="#1e3a5f"/>
  <circle cx="82" cy="18" r="2.5" fill="#1e3a5f"/>
  <circle cx="18" cy="82" r="2.5" fill="#1e3a5f"/>
  <circle cx="82" cy="82" r="2.5" fill="#1e3a5f"/>
  <!-- Corner circuit traces -->
  <line x1="18" y1="18" x2="30" y2="18" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="18" y1="18" x2="18" y2="30" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="70" y1="18" x2="82" y2="18" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="82" y1="18" x2="82" y2="30" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="18" y1="70" x2="18" y2="82" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="18" y1="82" x2="30" y2="82" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="82" y1="70" x2="82" y2="82" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="70" y1="82" x2="82" y2="82" stroke="#1e3a5f" stroke-width="1"/>
  <!-- A left leg -->
  <line x1="26" y1="76" x2="44" y2="24" stroke="#3b82f6" stroke-width="5.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- A right leg -->
  <line x1="74" y1="76" x2="56" y2="24" stroke="#3b82f6" stroke-width="5.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- A crossbar -->
  <line x1="34" y1="57" x2="66" y2="57" stroke="#60a5fa" stroke-width="3.5" stroke-linecap="round" filter="url(#glow2)"/>
  <!-- Top apex node — purple -->
  <circle cx="50" cy="23" r="5" fill="#7c3aed" filter="url(#glow)"/>
  <circle cx="50" cy="23" r="2.5" fill="#c4b5fd"/>
  <!-- Bottom nodes -->
  <circle cx="26" cy="76" r="3.5" fill="#2563eb" filter="url(#glow2)"/>
  <circle cx="74" cy="76" r="3.5" fill="#2563eb" filter="url(#glow2)"/>
  <!-- Crossbar nodes -->
  <circle cx="34" cy="57" r="2.5" fill="#60a5fa" filter="url(#glow2)"/>
  <circle cx="66" cy="57" r="2.5" fill="#60a5fa" filter="url(#glow2)"/>
  <!-- Micro circuit dots -->
  <circle cx="39" cy="40" r="1" fill="#1e3a5f"/>
  <circle cx="61" cy="40" r="1" fill="#1e3a5f"/>
</svg>
