# Fly.io deploy config for the ATLAS backend.
#
# Deploy flow (from /Users/zaqyas.mahmood/Documents/Me/Agents/backend):
#   fly launch --no-deploy --name atlas-backend   # first time only
#   fly secrets set ANTHROPIC_API_KEY=... SUPABASE_URL=... SUPABASE_SERVICE_KEY=... \
#       SUPABASE_ANON_KEY=... DASHBOARD_API_KEY=... \
#       NEXT_PUBLIC_API_URL=https://atlas-backend.fly.dev \
#       NEXT_PUBLIC_FRONTEND_URL=https://<your-pages>.pages.dev \
#       ENVIRONMENT=production ANTHROPIC_MODEL=claude-sonnet-4-6
#   fly deploy
#
# The scheduler must stay running to tick agents — we disable auto-stop and
# pin at least one machine running at all times. One shared-cpu-1x / 256MB
# machine is within the Fly free allowance (3 machines × 256MB).

app = "atlas-backend"
primary_region = "lhr"              # change to your nearest: ams, iad, ord, sjc, syd, nrt

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false        # scheduler must stay alive
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
